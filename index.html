<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>Sales Dashboard</h1>

        <div id="status">
            Loading...
        </div>

    </div>

    <div class="kpi-grid">

        <div class="card">

            <span>Total GMV</span>

            <h3 id="totalGMV">
                0
            </h3>

        </div>

        <div class="card">

            <span>Total Units</span>

            <h3 id="totalUnits">
                0
            </h3>

        </div>

        <div class="card">

            <span>Total Payout</span>

            <h3 id="totalPayout">
                0
            </h3>

        </div>

        <div class="card">

            <span>Total ASIN</span>

            <h3 id="totalASIN">
                0
            </h3>

        </div>

    </div>

</div>
<div class="table-section">

    <h2>Brand Wise Sales</h2>

    <table id="brandTable">

        <thead>

            <tr>

                <th>Brand</th>
                <th>GMV</th>
                <th>Unit</th>
                <th>ASP</th>
                <th>Payout</th>
                <th>AOV</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>
<script src="js/app.js"></script>

</body>

</html>
