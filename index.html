<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js"></script>

<script src="js/filter.js"></script>

<script src="js/dateFilter.js"></script>

<script src="js/kpi.js"></script>

<script src="js/brandTable.js"></script>

<script src="js/categoryTable.js"></script>

<script src="js/statusTable.js"></script>

<script src="js/charts.js"></script>

<script src="js/export.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>Sales Dashboard</h1>

        <div id="status">
            Loading...
        </div>

    </div>

    <div class="kpi-grid">

        <div class="card">
            <span>Total GMV</span>
            <h3 id="totalGMV">0</h3>
        </div>

        <div class="card">
            <span>Total Units</span>
            <h3 id="totalUnits">0</h3>
        </div>

        <div class="card">
            <span>ASP</span>
            <h3 id="totalASP">0</h3>
        </div>

        <div class="card">
            <span>Total Payout</span>
            <h3 id="totalPayout">0</h3>
        </div>

        <div class="card">
            <span>Total ASIN</span>
            <h3 id="totalASIN">0</h3>
        </div>

    </div>

    <!-- FILTERS -->

    <div class="filter-section">

        <input
            type="text"
            id="searchBox"
            placeholder="Search Brand / ASIN / SKU">

        <select id="brandFilter">
            <option value="All">All Brands</option>
        </select>

        <select id="categoryFilter">
            <option value="All">All Categories</option>
        </select>

        <select id="statusFilter">
            <option value="All">All Status</option>
        </select>

        <select id="yearFilter">
            <option value="All">All Years</option>
        </select>

        <select id="monthFilter">
            <option value="All">All Months</option>
        </select>

        <select id="quickDateFilter">
            <option value="">Quick Date Filter</option>
            <option value="today">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="7">Last 7 Days</option>
            <option value="15">Last 15 Days</option>
            <option value="30">Last 30 Days</option>
            <option value="45">Last 45 Days</option>
            <option value="60">Last 60 Days</option>
            <option value="90">Last 90 Days</option>
            <option value="mtd">MTD</option>
            <option value="ytd">YTD</option>
        </select>

        <input
            type="date"
            id="fromDate">

        <input
            type="date"
            id="toDate">

    </div>

    <!-- ACTION BUTTONS -->

    <div class="action-section">

        <button id="exportExcelBtn">
            Export Excel
        </button>

        <button id="exportCsvBtn">
            Export CSV
        </button>

    </div>

    <!-- BRAND TABLE -->

    <div class="table-section">

        <h2>Brand Wise Sales</h2>

        <table id="brandTable">

            <thead>

                <tr>
                    <th>Brand</th>
                    <th>GMV</th>
                    <th>Unit</th>
                    <th>ASP</th>
                    <th>Payout</th>
                    <th>AOV</th>
                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- CHARTS -->

    <div class="chart-section">

        <h2>Top Brands GMV</h2>

        <canvas id="brandChart"></canvas>

    </div>

    <div class="chart-section">

        <h2>Category Share</h2>

        <canvas id="categoryChart"></canvas>

    </div>

    <div class="chart-section">

        <h2>GMV Trend</h2>

        <canvas id="trendChart"></canvas>

    </div>

    <!-- CATEGORY TABLE -->

    <div class="table-section">

        <h2>Category Wise Sales</h2>

        <table id="categoryTable">

            <thead>

                <tr>
                    <th>Category</th>
                    <th>GMV</th>
                    <th>Unit</th>
                    <th>ASP</th>
                    <th>Payout</th>
                    <th>ASIN</th>
                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </div>

    <!-- STATUS TABLE -->

    <div class="table-section">

        <h2>Status Wise Sales</h2>

        <table id="statusTable">

            <thead>

                <tr>
                    <th>Status</th>
                    <th>GMV</th>
                    <th>Unit</th>
                    <th>ASP</th>
                    <th>Payout</th>
                    <th>ASIN</th>
                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

<script src="js/app.js?v=25"></script>

</body>
</html>
